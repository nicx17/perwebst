name: HTML Validate

on:
  push:
  pull_request:

jobs:
  html-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate HTML
        run: |
          find . -name '*.html' -print0 | xargs -0 npx html-validate@10
