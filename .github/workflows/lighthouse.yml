name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    env:
      ORIGIN: https://link.nickcardoso.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/astro-preview.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4321/ > /dev/null; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start"
          cat /tmp/astro-preview.log || true
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:4321/
            http://127.0.0.1:4321/about/
            http://127.0.0.1:4321/projects/
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json
